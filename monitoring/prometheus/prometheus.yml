global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: elastickv
    authorization:
      type: Bearer
      credentials: demo-metrics-token
    static_configs:
      - targets:
          - host.docker.internal:9091
          - host.docker.internal:9092
          - host.docker.internal:9093
