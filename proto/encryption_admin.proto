syntax = "proto3";

option go_package = "github.com/bootjp/elastickv/proto";

// EncryptionAdmin is the operator-facing control plane for the
// data-at-rest encryption feature described in
// docs/design/2026_04_29_partial_data_at_rest_encryption.md. The
// service is split into two groups:
//
//   1. Read-only, leaderless probes (GetCapability,
//      GetSidecarState, ResyncSidecar). Safe to call on any
//      member including learners; each returns the responding
//      node's local view. The §5.6 / §7.1 cutover paths fan
//      GetCapability out across every member of every Raft group
//      to drive the pre-flight capability check and to collect
//      the (full_node_id, local_epoch) batch that goes into the
//      bootstrap-encryption Raft entry. GetSidecarState and
//      ResyncSidecar share the §5.5 sidecar-recovery role: a
//      follower whose sidecar fell behind a Raft-log compaction
//      window calls either RPC against the leader and rewrites
//      its local keys.json from the response. ResyncSidecar is
//      addressed at the leader because the recovery flow only
//      consults the leader's record; GetSidecarState answers from
//      any node and is the broader observability surface.
//
//   2. Mutating RPCs that propose FSM-internal entries through
//      the default Raft group's leader (BootstrapEncryption,
//      RotateDEK, RegisterEncryptionWriter). They route to the
//      leader; followers return FailedPrecondition with the
//      currently-known leader so the operator's CLI can retry
//      against the right node.
//
// Wire-format notes:
//   - local_epoch is the §4.1 16-bit nonce field carried as
//     uint32 (proto3 has no uint16). Every decode site MUST
//     validate value <= 0xFFFF; values above 0xFFFF return
//     ErrLocalEpochOutOfRange. The mutating RPCs that accept a
//     writer-registry batch (BootstrapEncryption) MUST apply the
//     same check at the server boundary before the batch is
//     forwarded into the Raft proposal.
//   - wrapped_dek payloads are sidecar-format bytes (DEK wrapped
//     under the current KEK) and are leakage-safe: an RPC
//     response that exposes them is no worse than reading the
//     on-disk sidecar.
service EncryptionAdmin {
  rpc GetCapability (Empty) returns (CapabilityReport) {}
  rpc GetSidecarState (Empty) returns (SidecarStateReport) {}
  rpc BootstrapEncryption (BootstrapEncryptionRequest) returns (BootstrapEncryptionResponse) {}
  rpc RotateDEK (RotateDEKRequest) returns (RotateDEKResponse) {}
  rpc RegisterEncryptionWriter (RegisterEncryptionWriterRequest) returns (RegisterEncryptionWriterResponse) {}
  rpc ResyncSidecar (ResyncSidecarRequest) returns (ResyncSidecarResponse) {}
}

message Empty {}

// CapabilityReport mirrors §6.1 admin.go's CapabilityReport. Served
// on every node regardless of leadership state. A node that has
// never run with --encryption-enabled returns encryption_capable=false
// with local_epoch=0 and full_node_id=0, and the cutover command
// refuses with ErrCapabilityCheckFailed so the empty epoch never
// reaches the writer registry.
message CapabilityReport {
  bool   encryption_capable = 1;
  string build_sha          = 2;
  bool   sidecar_present    = 3;
  uint64 full_node_id       = 4;
  uint32 local_epoch        = 5; // MUST be <= 0xFFFF on the wire.
}

// SidecarStateReport is the §5.5 compaction-fallback RPC. Served on
// every node but the cutover-recovery flow only consults the
// leader's response. wrapped_deks_by_id covers every unretired DEK.
message SidecarStateReport {
  map<uint32, bytes>  wrapped_deks_by_id           = 1;
  uint32              active_storage_id            = 2;
  uint32              active_raft_id               = 3;
  bool                storage_envelope_active      = 4;
  uint64              raft_envelope_cutover_index  = 5;
  uint64              latest_applied_index         = 6;
  map<uint32, uint32> writer_registry_for_caller   = 7; // values MUST be <= 0xFFFF.
}

// WriterRegistryEntry is the per-member input the leader collects
// during the §5.6 step 1a batch. The two uint32 fields cover the
// 64-bit full_node_id and the 16-bit local_epoch (carried as
// uint32; <= 0xFFFF validated at the server boundary).
message WriterRegistryEntry {
  uint64 full_node_id = 1;
  uint32 local_epoch  = 2; // MUST be <= 0xFFFF on the wire.
}

// BootstrapEncryptionRequest carries the freshly-generated wrapped
// DEKs and the writer-registry batch the leader gathered from
// every member's GetCapability response. The server validates each
// local_epoch is in range before composing the §11.3 0x04
// OpBootstrap body.
message BootstrapEncryptionRequest {
  bytes                        wrapped_storage_dek = 1;
  bytes                        wrapped_raft_dek    = 2;
  uint32                       storage_dek_id      = 3;
  uint32                       raft_dek_id         = 4;
  repeated WriterRegistryEntry writer_batch        = 5;
}

message BootstrapEncryptionResponse {
  uint64 applied_index = 1;
}

// RotateDEKRequest proposes a §5.2 rotation as a §11.3 0x05
// OpRotation entry. purpose distinguishes the two key purposes;
// the storage rotation appends a new storage DEK and shifts
// active_storage_id, and the raft rotation does the same for raft.
message RotateDEKRequest {
  enum Purpose {
    PURPOSE_UNSPECIFIED = 0;
    PURPOSE_STORAGE     = 1;
    PURPOSE_RAFT        = 2;
  }
  Purpose purpose         = 1;
  bytes   wrapped_new_dek = 2;
  uint32  new_dek_id      = 3;
  uint64  proposer_node_id = 4; // proposer registration payload, §5.2
  uint32  proposer_local_epoch = 5; // MUST be <= 0xFFFF on the wire.
}

message RotateDEKResponse {
  uint64 applied_index = 1;
}

// RegisterEncryptionWriterRequest proposes a §11.3 0x03
// OpRegistration entry for the calling node. Used by nodes that
// joined the cluster after bootstrap (§5.6 step 4).
message RegisterEncryptionWriterRequest {
  uint32                       dek_id  = 1;
  repeated WriterRegistryEntry writers = 2;
}

message RegisterEncryptionWriterResponse {
  uint64 applied_index = 1;
}

// ResyncSidecarRequest is the §5.5 follower-repair RPC. The caller
// asks the leader to ship its current wrapped DEK set so the
// follower can rewrite its sidecar. Read-only on the leader (no
// Raft proposal is involved).
message ResyncSidecarRequest {
  uint64 caller_full_node_id = 1;
}

message ResyncSidecarResponse {
  map<uint32, bytes> wrapped_deks_by_id          = 1;
  uint32             active_storage_id           = 2;
  uint32             active_raft_id              = 3;
  uint64             leader_latest_applied_index = 4;

  // writer_registry_for_caller carries the leader's recorded
  // (dek_id, last_seen_local_epoch) for the calling node so the
  // follower can re-derive its §4.1 local_epoch monotonically.
  // Values MUST be <= 0xFFFF and the decode site MUST enforce
  // that bound. Empty until Stage 7 wires the registry; the
  // §5.5 recovery flow tolerates an empty map because a node
  // recovering before any DEK exists has nothing to re-derive.
  map<uint32, uint32> writer_registry_for_caller = 5;
}
