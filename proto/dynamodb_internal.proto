syntax = "proto3";

option go_package = "github.com/bootjp/elastickv/proto";

// dynamodb_internal.proto defines DynamoDB adapter payloads stored inside the KV engine.

message DynamoKeySchema {
  string hash_key = 1;
  string range_key = 2;
}

message DynamoGSIProjection {
  string projection_type = 1;
  repeated string non_key_attributes = 2;
}

message DynamoGlobalSecondaryIndex {
  DynamoKeySchema key_schema = 1;
  DynamoGSIProjection projection = 2;
}

message DynamoTableSchema {
  string table_name = 1;
  map<string, string> attribute_definitions = 2;
  DynamoKeySchema primary_key = 3;
  map<string, DynamoGlobalSecondaryIndex> global_secondary_indexes = 4;
  uint64 key_encoding_version = 5;
  uint64 migrating_from_generation = 6;
  uint64 generation = 7;
}

message DynamoStringSet {
  repeated string values = 1;
}

message DynamoNumberSet {
  repeated string values = 1;
}

message DynamoBinarySet {
  repeated bytes values = 1;
}

message DynamoAttributeValueList {
  repeated DynamoAttributeValue values = 1;
}

message DynamoAttributeValueMap {
  map<string, DynamoAttributeValue> values = 1;
}

message DynamoAttributeValue {
  oneof value {
    string s = 1;
    string n = 2;
    bytes b = 3;
    bool bool_value = 4;
    bool null_value = 5;
    DynamoStringSet ss = 6;
    DynamoNumberSet ns = 7;
    DynamoBinarySet bs = 8;
    DynamoAttributeValueList l = 9;
    DynamoAttributeValueMap m = 10;
  }
}

message DynamoItem {
  map<string, DynamoAttributeValue> attributes = 1;
}
