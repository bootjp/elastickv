syntax = "proto3";

option go_package = "github.com/bootjp/elastickv/proto";

service RawKV {
  rpc RawPut(RawPutRequest) returns (RawPutResponse) {}
  rpc RawGet(RawGetRequest) returns (RawGetResponse) {}
  rpc RawDelete(RawDeleteRequest) returns (RawDeleteResponse) {}
  rpc RawLatestCommitTS(RawLatestCommitTSRequest) returns (RawLatestCommitTSResponse) {}
  rpc RawScanAt(RawScanAtRequest) returns (RawScanAtResponse) {}
}

service TransactionalKV {
  rpc Put(PutRequest) returns (PutResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Scan(ScanRequest) returns (ScanResponse) {}

  rpc PreWrite(PreWriteRequest) returns (PreCommitResponse) {}
  rpc Commit(CommitRequest) returns (CommitResponse) {}
  rpc Rollback(RollbackRequest) returns (RollbackResponse) {}
}

service RaftAdmin {
  rpc Status(RaftAdminStatusRequest) returns (RaftAdminStatusResponse) {}
  rpc Configuration(RaftAdminConfigurationRequest) returns (RaftAdminConfigurationResponse) {}
  rpc AddVoter(RaftAdminAddVoterRequest) returns (RaftAdminConfigurationChangeResponse) {}
  rpc RemoveServer(RaftAdminRemoveServerRequest) returns (RaftAdminConfigurationChangeResponse) {}
  rpc TransferLeadership(RaftAdminTransferLeadershipRequest) returns (RaftAdminTransferLeadershipResponse) {}
}

message RawPutRequest {
  bytes key = 1;
  bytes value = 2;
}

message RawPutResponse {
  uint64 commit_index = 1;
  bool success = 2;
}

message RawGetRequest {
  bytes key = 1;
  uint64 ts = 3; // optional read timestamp; if zero, server uses current HLC
}

message RawGetResponse {
  uint64 read_at_index = 1;
  bytes value = 2;
  bool exists = 3;
}

message RawDeleteRequest {
  bytes key = 1;
}

message RawDeleteResponse {
  uint64 commit_index = 1;
  bool success = 2;
}

message RawLatestCommitTSRequest {
  bytes key = 1;
}

message RawLatestCommitTSResponse {
  uint64 ts = 1;
  bool exists = 2;
}

message RawScanAtRequest {
  bytes start_key = 1;
  bytes end_key = 2;
  int64 limit = 3; // validated against host int size; large values may be rejected
  uint64 ts = 4; // optional read timestamp; if zero, server uses current HLC
  bool reverse = 5;
}

message RawKVPair {
  bytes key = 1;
  bytes value = 2;
}

message RawScanAtResponse {
  repeated RawKVPair kv = 1;
}

message PutRequest {
  bytes key = 1;
  bytes value = 2;
}

message PutResponse {
  uint64 commit_index = 1;
  bool success = 2;
}

message DeleteRequest {
  bytes key = 1;
}

message DeleteResponse {
  uint64 commit_index = 1;
  bool success = 2;
}

message GetRequest {
  bytes key = 1;
}

message GetResponse {
  uint64 read_at_index = 1;
  bytes value = 2;
}

message KeyError {
  string message = 1;
  bool retryable = 2;
}

message Kv {
  KeyError error = 1;
  bytes key = 2;
  bytes value = 3;
}

message ScanRequest {
  bytes start_key = 1;
  bytes end_key = 2;
  uint64 limit = 3;
}

message ScanResponse {
  repeated Kv kv = 1;
}

message PreWriteRequest {
  // mutations is the list of mutations to apply atomically.
  repeated Kv mutations = 2;
  // start_ts is the timestamp of the transaction.
  uint64 start_ts = 3;
  // lock_ttl is the TTL of the lock in milliseconds.
  uint64 lock_ttl = 4;
}

message PreCommitResponse {
  repeated KeyError errors = 1;
}

message CommitRequest {
  // start_ts is the timestamp of prewrite request.
  uint64 start_ts = 1;

  repeated bytes keys = 2;
}

message CommitResponse {
  uint64 commit_index = 1;
  bool success = 2;
  repeated KeyError errors = 3;
}

message RollbackRequest {
  uint64 start_ts = 1;
}

message RollbackResponse {
  bool success = 1;
}

enum RaftAdminState {
  RAFT_ADMIN_STATE_UNKNOWN = 0;
  RAFT_ADMIN_STATE_FOLLOWER = 1;
  RAFT_ADMIN_STATE_CANDIDATE = 2;
  RAFT_ADMIN_STATE_LEADER = 3;
  RAFT_ADMIN_STATE_SHUTDOWN = 4;
}

message RaftAdminStatusRequest {}

message RaftAdminStatusResponse {
  RaftAdminState state = 1;
  string leader_id = 2;
  string leader_address = 3;
  uint64 term = 4;
  uint64 commit_index = 5;
  uint64 applied_index = 6;
  uint64 last_log_index = 7;
  uint64 last_snapshot_index = 8;
  uint64 fsm_pending = 9;
  uint64 num_peers = 10;
  int64 last_contact_nanos = 11;
}

message RaftAdminConfigurationRequest {}

message RaftAdminMember {
  string id = 1;
  string address = 2;
  string suffrage = 3;
}

message RaftAdminConfigurationResponse {
  repeated RaftAdminMember servers = 1;
}

message RaftAdminAddVoterRequest {
  string id = 1;
  string address = 2;
  uint64 previous_index = 3;
}

message RaftAdminRemoveServerRequest {
  string id = 1;
  uint64 previous_index = 2;
}

message RaftAdminConfigurationChangeResponse {
  uint64 index = 1;
}

message RaftAdminTransferLeadershipRequest {
  string target_id = 1;
  string target_address = 2;
}

message RaftAdminTransferLeadershipResponse {}
