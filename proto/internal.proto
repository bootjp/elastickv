syntax = "proto3";

option go_package = "github.com/bootjp/elastickv/proto";


service Internal {
  // for internal leader redirect only
  rpc Forward(ForwardRequest) returns (ForwardResponse) {}
  rpc RelayPublish(RelayPublishRequest) returns (RelayPublishResponse) {}
  rpc ExportRangeVersions(ExportRangeVersionsRequest) returns (stream ExportRangeVersionsResponse) {}
  rpc ImportRangeVersions(ImportRangeVersionsRequest) returns (ImportRangeVersionsResponse) {}
  rpc PromoteStagedVersions(PromoteStagedVersionsRequest) returns (PromoteStagedVersionsResponse) {}
  rpc ApplyTargetStagedReadiness(TargetStagedReadinessRequest) returns (TargetStagedReadinessResponse) {}
}

// internal.proto is node to node communication message in raft replication.
enum Op {
  PUT = 0;
  DEL = 1;
  // DEL_PREFIX deletes all visible keys matching the prefix stored in `key`.
  // An empty key means "all keys". Transaction-internal keys (!txn|) are
  // always excluded.  This operation is applied locally by the FSM on each
  // node, so the Raft log contains only a single mutation regardless of how
  // many keys are deleted.
  DEL_PREFIX = 2;
}

message Mutation {
  Op op = 1;
  bytes key = 2;
  bytes value = 3;
}

enum Phase {
  NONE = 0;
  PREPARE = 1;
  COMMIT = 2;
  ABORT = 3;
}

message Request {
  bool is_txn = 1;
  Phase phase = 2;
  uint64 ts = 3;
  repeated Mutation mutations = 4;
  // read_keys carries the transaction's read set so that the FSM can validate
  // read-write conflicts atomically with the commit. Each entry is a storage
  // key that was read during the transaction; the FSM checks that none of them
  // were written after ts (the transaction's start timestamp).
  repeated bytes read_keys = 5;
  // observed_route_version is the durable catalog version the
  // transaction's read set was captured at (set on BeginTxn from
  // distribution.Engine.Version()). Zero means "unpinned" (legacy
  // callers + read-only paths). M3 of the Composed-1 design
  // (docs/design/2026_05_29_implemented_composed1_cross_group_commit_guard.md)
  // will gate the FSM apply path on it; M1 (this field's introduction)
  // is plumbing only — the FSM ignores the value, so all existing
  // callers see no behaviour change.
  uint64 observed_route_version = 6;
  // write_fence_bypass_keys carries point keys whose owner was resolved by a
  // higher-level partition resolver before the request was appended to Raft.
  // The FSM uses it only to skip the byte-route write fence for those exact
  // point mutations; prefix deletes and unmarked keys still fail closed.
  repeated bytes write_fence_bypass_keys = 7;
}

message RaftCommand {
  repeated Request requests = 1;
}

message ForwardRequest {
  bool is_txn = 1;
  repeated Request requests = 2;
}

// for internal leader redirect
message ForwardResponse {
  bool success = 1;
  uint64 commit_index = 2;
}

message RelayPublishRequest {
  bytes channel = 1;
  bytes message = 2;
}

message RelayPublishResponse {
  int64 subscribers = 1;
}

message ExportRangeVersionsRequest {
  bytes range_start = 1;
  bytes range_end = 2;
  uint64 max_commit_ts = 3;
  uint64 min_commit_ts = 4;
  bytes cursor = 5;
  uint32 chunk_bytes = 6;
  bytes route_start = 7;
  bytes route_end = 8;
  uint64 max_scanned_bytes = 9;
  // Migration bracket family tag copied into exported MVCCVersion.key_family.
  // Zero is invalid on the RPC path: callers must pass the bracket family they
  // are exporting so target promotion can keep family-specific metadata.
  uint32 key_family = 10;
  // Applies the user-bracket exclusion list for known internal families.
  bool exclude_known_internal = 11;
  // Bracket-local raw-prefix exclusions, e.g. non-partitioned SQS brackets
  // excluding their partitioned subprefixes.
  repeated bytes exclude_prefixes = 12;
}

message ExportRangeVersionsResponse {
  repeated MVCCVersion versions = 1;
  bytes next_cursor = 2;
  bool done = 3;
}

message MVCCVersion {
  bytes key = 1;
  uint64 commit_ts = 2;
  bool tombstone = 3;
  bytes value = 4;
  uint32 key_family = 5;
  uint64 expire_at = 6;
}

message ImportRangeVersionsRequest {
  uint64 job_id = 1;
  repeated MVCCVersion versions = 2;
  bytes cursor = 3;
  uint64 bracket_id = 4;
  uint64 batch_seq = 5;
}

message ImportRangeVersionsResponse {
  bytes acked_cursor = 1;
}

message PromoteStagedVersionsRequest {
  uint64 job_id = 1;
  bytes cursor = 2;
  uint32 max_versions = 3;
  uint64 max_bytes = 4;
  uint64 max_scanned_bytes = 5;
}

message PromoteStagedVersionsResponse {
  bytes next_cursor = 1;
  bool done = 2;
  uint64 promoted_rows = 3;
  uint64 max_promoted_ts = 4;
}

message TargetStagedReadinessRequest {
  uint64 job_id = 1;
  bytes route_start = 2;
  bytes route_end = 3;
  uint64 expected_cutover_version = 4;
  uint64 migration_job_id = 5;
  uint64 min_write_ts_exclusive = 6;
  bool armed = 7;
}

message TargetStagedReadinessResponse {}
