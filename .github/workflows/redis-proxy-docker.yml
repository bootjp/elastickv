name: redis-proxy Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - 'cmd/redis-proxy/**'
      - 'proxy/**'
      - 'Dockerfile.redis-proxy'
      - '.github/workflows/redis-proxy-docker.yml'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - 'cmd/redis-proxy/**'
      - 'proxy/**'
      - 'Dockerfile.redis-proxy'
      - '.github/workflows/redis-proxy-docker.yml'
      - 'go.mod'
      - 'go.sum'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}/redis-proxy
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          ref_tag="$(printf '%s' "$GITHUB_REF_NAME" | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          ref_tag="${ref_tag:0:128}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${short_sha}"
            if [[ "${GITHUB_EVENT_NAME}" != "pull_request" && -n "${ref_tag}" ]]; then
              echo "${IMAGE}:${ref_tag}"
            fi
            if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.redis-proxy
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
