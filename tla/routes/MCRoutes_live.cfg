\* TLC config: Routes M6 liveness model — checks Routes-L1 (eventual
\* fan-out: every node's RouteEngine catches up to the durable
\* catalog) under the SpecLive definition which adds weak-fairness on
\* CatalogWatcherSync(n) for every node n.
\*
\* This is an OPTIONAL milestone per
\* docs/design/2026_05_28_partial_tla_safety_spec.md §5.6.  TLC
\* liveness mode is materially slower than safety mode, so the bounds
\* are tighter than the safety config (two nodes, MaxVersions = 2,
\* MaxOps = 4) — enough to exercise the (engineVersion[n] <
\* catalogVersion) leads-to (engineVersion[n] = catalogVersion)
\* obligation without exploding the diameter.

SPECIFICATION SpecLive

CONSTANTS
    Nodes = {n1, n2}
    MaxVersions = 2
    MaxOps = 4
    EnableSafety = TRUE

SYMMETRY NodeSymmetry

\* The safety invariants are still checked so a safety regression
\* that managed to sneak past the safety config surfaces here too.
INVARIANTS
    TypeOK
    Routes1_VersionInRange
    Routes2_CoverageDisjoint
    Routes3_SplitAtomicity
    Routes4_NoEngineRegression

\* The new liveness property plus the existing transition forms.
PROPERTIES
    Routes1_Action
    Routes4_GhostMonotonic
    Routes_L1_EventualFanOut

CONSTRAINT StateConstraint

\* Liveness checking interacts with deadlocks: TLC treats a fully
\* quiescent state as a deadlock by default.  The route plane
\* legitimately reaches a state where every node has caught up to
\* MaxVersions and no further action is enabled — not a deadlock.
CHECK_DEADLOCK
    FALSE
