\* TLC config: Routes safety model — CatalogWatcherSync enforces
\* monotonicity per node.  Expected outcome: TLC explores the bounded
\* state space and finds no invariant violation.

SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2}
    MaxVersions = 3
    MaxOps = 4
    EnableSafety = TRUE

SYMMETRY NodeSymmetry

INVARIANTS
    TypeOK
    Routes1_VersionInRange
    Routes2_CoverageDisjoint
    Routes3_SplitAtomicity
    Routes4_NoEngineRegression

PROPERTIES
    Routes1_Action
    Routes4_GhostMonotonic

CONSTRAINT StateConstraint

\* Quiescence (no enabled action under MaxOps / MaxVersions) is a valid
\* end state for Routes.tla — not a deadlock bug.
CHECK_DEADLOCK
    FALSE
