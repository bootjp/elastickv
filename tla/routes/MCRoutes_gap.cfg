\* TLC config: Routes gap model — EnableSafety = FALSE.
\* CatalogWatcherSync no longer requires v >= engineMaxObserved[n], so
\* the watcher may overwrite its cached engineVersion with a stale
\* (older) snapshot.  TLC is expected to FAIL on
\* Routes4_NoEngineRegression and emit a 3-step counterexample.
\*
\* The make tla-check harness inverts the exit code for this config AND
\* greps for the specific Routes-4 violation string, so any other
\* failure mode (parse error, deadlock, JVM crash, different invariant)
\* fails rather than being silently treated as the expected
\* counterexample.

SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2}
    MaxVersions = 3
    MaxOps = 4
    EnableSafety = FALSE

SYMMETRY NodeSymmetry

INVARIANTS
    TypeOK
    Routes1_VersionInRange
    Routes2_CoverageDisjoint
    Routes3_SplitAtomicity
    Routes4_NoEngineRegression

PROPERTIES
    Routes1_Action
    Routes4_GhostMonotonic

CONSTRAINT StateConstraint

\* See MCRoutes.cfg — quiescence is a valid end state, not a deadlock.
CHECK_DEADLOCK
    FALSE
