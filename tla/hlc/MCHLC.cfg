\* TLC config: HLC safety model — encodes all three HLC-4 preconditions.
\* Expected outcome: TLC explores the bounded state space and finds no
\* invariant violation, i.e. proves HLC-1..HLC-4 hold in the correct
\* design.

SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2, n3}
    MaxClockSkewMs = 0
    HlcPhysicalWindowMs = 1
    MaxTerms = 2
    MaxOps = 3
    MaxWallTime = 3
    LogicalMax = 1
    EnableSafety = TRUE

SYMMETRY NodeSymmetry

INVARIANTS
    TypeOK
    HLC1_PerNodeMonotonic
    HLC2_NonNeg
    HLC3_LeaderOnly
    HLC4_NoRegressionAcrossTerms

PROPERTIES
    HLC1_Action
    HLC2_Action

CONSTRAINT StateConstraint
