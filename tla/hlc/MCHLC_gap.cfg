\* TLC config: HLC gap model — preconditions (ii) and (iii) are disabled
\* (EnableSafety = FALSE).  Expected outcome: TLC FAILS the
\* HLC4_NoRegressionAcrossTerms invariant and emits a counterexample
\* trace.  This is not a bug in the spec; it is the motivating evidence
\* that strategy (c) handoff + the IssueTimestamp ceiling fence are
\* necessary for HLC-4 to hold.
\*
\* The make tla-check target inverts the exit code for this config so a
\* TLC FAILURE here counts as PASS for CI.

SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2, n3}
    MaxClockSkewMs = 0
    HlcPhysicalWindowMs = 1
    MaxTerms = 2
    MaxOps = 3
    MaxWallTime = 3
    LogicalMax = 1
    EnableSafety = FALSE

SYMMETRY NodeSymmetry

INVARIANTS
    TypeOK
    HLC1_PerNodeMonotonic
    HLC2_CeilingMonotonic
    HLC3_LeaderOnly
    HLC4_NoRegressionAcrossTerms

CONSTRAINT StateConstraint
