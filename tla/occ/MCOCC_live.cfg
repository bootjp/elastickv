\* TLC config: OCC M6 liveness model — checks OCC-L1 (every Active txn
\* eventually terminates) under the SpecLive definition which adds
\* weak-fairness on Abort(t) for every t.
\*
\* This is an OPTIONAL milestone per
\* docs/design/2026_05_28_partial_tla_safety_spec.md §5.6.  TLC
\* liveness mode is materially slower than safety mode, so the bounds
\* are tighter (MaxTs = 4, MaxOps = 3, two txns, two keys) — enough
\* to exercise the (Active → terminal) and (Prepared → terminal)
\* leads-to obligations without exploding the diameter.

SPECIFICATION SpecLive

CONSTANTS
    Keys = {k1, k2}
    TxnIds = {t1, t2}
    MaxTs = 4
    MaxOps = 3
    EnableSafety = TRUE

SYMMETRY Symmetry

\* TypeOK and the OCC-1..5 safety invariants are still checked so
\* the liveness run also catches a safety regression that managed to
\* sneak past the safety configs.
INVARIANTS
    TypeOK
    OCC1_CommitTsAboveStart
    OCC2_NoWriteWriteConflict
    OCC3_ReadSnapshotStability
    OCC4_NoStrandedLockAtQuiescence
    OCC5_StartTsConsistency

\* The new liveness property.  OCC_L1_TxnTerminates covers both
\* Active and Prepared transactions by requiring every txn to
\* eventually settle into Idle / Committed / Aborted (the `<>[]`
\* form); the earlier draft also had an OCC_L1a_PreparedTerminates
\* companion but it was folded into OCC_L1_TxnTerminates when the
\* property switched from leads-to to `<>[]` (coderabbit minor on
\* PR #880).
PROPERTIES
    OCC5_Action
    CommitTsAssignedOnce
    OCC_L1_TxnTerminates

CONSTRAINT StateConstraint

\* Liveness checking interacts with deadlocks: TLC treats a fully
\* quiescent state as a deadlock by default, which is the wrong
\* semantics for a transition system that legitimately terminates
\* (every txn ends in Committed or Aborted).
CHECK_DEADLOCK
    FALSE
