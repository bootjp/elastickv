\* TLC config: OCC gap model — EnableSafety = FALSE.  The Commit action
\* skips the OCC-1 strict-greater guard, so TLC is expected to FAIL on
\* the OCC1_CommitTsAboveStart invariant and emit a counterexample.
\* This is not a bug in the spec; it is the motivating evidence that
\* the commit-ts gating is necessary.
\*
\* The make tla-check target inverts the exit code for this config and
\* greps for the specific OCC-1 violation string, so any other failure
\* mode (parse error, deadlock, JVM crash, different invariant) fails
\* the harness rather than being silently treated as the expected
\* counterexample.

SPECIFICATION Spec

CONSTANTS
    Keys = {k1, k2}
    TxnIds = {t1, t2}
    MaxTs = 4
    MaxOps = 3
    EnableSafety = FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    OCC1_CommitTsAboveStart
    OCC2_NoWriteWriteConflict
    OCC3_ReadSnapshotStability
    OCC4_NoStrandedLockAtQuiescence
    OCC5_StartTsConsistency

PROPERTIES
    OCC5_Action
    CommitTsAssignedOnce

CONSTRAINT StateConstraint

\* See MCOCC.cfg — quiescence is a valid end state, not a deadlock.
CHECK_DEADLOCK
    FALSE

